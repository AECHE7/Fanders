name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: fanders
        ports: ['3307:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_mysql

      - name: Install composer dependencies
        run: |
          composer install --no-interaction --prefer-dist

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do mysqladmin ping -h127.0.0.1 -P3307 --silent && break || sleep 1; done

      - name: Import schema
        run: |
          mysql -h127.0.0.1 -P3307 -uroot fanders < scripts/initdb/LMSschema.sql || true
          mysql -h127.0.0.1 -P3307 -uroot fanders < scripts/initdb/create_transaction_logs.sql || true

      - name: Run php -l (syntax check)
        run: |
          find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run PHPUnit
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3307
          DB_NAME: fanders
          DB_USER: root
          DB_PASS: ''
        run: |
          ./vendor/bin/phpunit --colors=always -v
