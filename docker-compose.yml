version: '3.8'
services:
  php:
    build: .
    container_name: fanders_php
    volumes:
      - ./:/app:cached
    working_dir: /app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    tty: true

  db:
    image: mysql:8.0
    container_name: fanders_db
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: fanders
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 12

volumes:
  db_data:
